services:
  - type: web
    name: synapse-server
    env: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false # User must provide this in the Render Dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: synapse-db
          property: connectionString

databases:
  - name: synapse-db
    databaseName: synapse
    user: synapse_user
